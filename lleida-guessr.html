<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LleidaGuessr</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap');
:root {
  --bg:#0a0a0f; --surface:#13131a; --border:#1e1e2e;
  --gold:#f5c542; --green:#3ddc84; --red:#ff4757; --blue:#4dabf7;
  --text:#e8eaf0; --muted:#6b6f80;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
#app{width:100%;height:100vh;display:flex;flex-direction:column}
#topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold)}
.logo span{color:var(--text)}
#score-display{display:flex;gap:20px}
.score-item{text-align:center}
.score-val{font-size:18px;font-weight:700;color:var(--gold)}
.score-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
#round-indicator{font-size:12px;color:var(--muted);font-weight:500}
#game-area{flex:1;display:flex;position:relative;overflow:hidden}
#sv-panel{flex:1;position:relative;background:#000}
#sv-img{width:100%;height:100%;object-fit:cover;display:none}
#sv-iframe{width:100%;height:100%;border:none;display:none}
#sv-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:10;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#sv-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--muted);white-space:nowrap;z-index:5;transition:opacity 0.5s}
#sv-source{position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.6);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted);z-index:5}
#map-panel{width:340px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface)}
#map-instructions{padding:14px 16px 10px;font-size:13px;color:var(--muted);line-height:1.5;border-bottom:1px solid var(--border)}
#map-instructions strong{color:var(--text)}
#map{flex:1}
#guess-btn{margin:12px;border:none;border-radius:8px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;background:var(--gold);color:#000;cursor:pointer;transition:all .15s;opacity:.4;pointer-events:none}
#guess-btn.ready{opacity:1;pointer-events:all}
#guess-btn.ready:hover{background:#ffd44d;transform:translateY(-1px)}
#result-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
#result-overlay.show{display:flex}
#result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:480px;max-width:90vw;text-align:center;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#result-distance{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:var(--gold);margin-bottom:4px}
#result-label{font-size:13px;color:var(--muted);margin-bottom:20px}
#result-points{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--green);margin-bottom:24px}
#result-map{width:100%;height:200px;border-radius:10px;overflow:hidden;margin-bottom:20px}
#next-btn{border:none;border-radius:8px;padding:14px 32px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;background:var(--gold);color:#000;cursor:pointer;transition:all .15s}
#next-btn:hover{background:#ffd44d}
#progress-bar{height:3px;background:var(--border);flex-shrink:0}
#progress-fill{height:100%;background:var(--gold);transition:width .4s ease;width:0%}

/* Admin panel */
#admin-btn{position:fixed;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;z-index:500}
#admin-panel{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:600;display:none;align-items:center;justify-content:center}
#admin-panel.show{display:flex}
#admin-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:520px;max-width:90vw;max-height:80vh;overflow-y:auto}
#admin-card h2{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);margin-bottom:16px}
.admin-form label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.admin-form input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;margin-bottom:12px}
.admin-form input:focus{outline:none;border-color:var(--gold)}
#photos-list{margin-bottom:16px}
.photo-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg);border-radius:6px;margin-bottom:6px;font-size:12px}
.photo-item img{width:48px;height:36px;object-fit:cover;border-radius:4px}
.photo-item .del{color:var(--red);cursor:pointer;margin-left:auto;font-size:16px}
.admin-btns{display:flex;gap:8px}
.admin-btns button{flex:1;border:none;border-radius:6px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer}
.btn-save{background:var(--gold);color:#000}
.btn-close{background:var(--border);color:var(--text)}

#streak-badge{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--green);display:none}

@media(max-width:700px){
  #game-area{flex-direction:column}
  #map-panel{width:100%;height:260px;border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">Lleida<span>Guessr</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div id="round-indicator">Ronda 1</div>
      <div id="streak-badge">🔥 Ratxa: <span id="streak-num">0</span></div>
    </div>
    <div id="score-display">
      <div class="score-item"><div class="score-val" id="total-score">0</div><div class="score-label">Punts</div></div>
      <div class="score-item"><div class="score-val" id="best-score">—</div><div class="score-label">Millor</div></div>
      <div class="score-item"><div class="score-val" id="avg-score">—</div><div class="score-label">Mitjana</div></div>
    </div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="game-area">
    <div id="sv-panel">
      <div id="sv-loading"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Carregant imatge…</div></div>
      <img id="sv-img" alt="Lloc de Lleida"/>
      <iframe id="sv-iframe" allowfullscreen></iframe>
      <div id="sv-hint">🔄 Arrossega per RotaR · No pots avançaR</div>
      <div id="sv-source"></div>
    </div>
    <div id="map-panel">
      <div id="map-instructions"><strong>On és aquesta imatge?</strong><br>Toca al MAPA per marcar la teva resposta</div>
      <div id="map"></div>
      <button id="guess-btn" onclick="submitGuess()">CONFIRMAR →</button>
    </div>
  </div>
  <div id="result-overlay">
    <div id="result-card">
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Distància</div>
      <div id="result-distance">—</div>
      <div id="result-label"></div>
      <div id="result-points"></div>
      <div id="result-map"></div>
      <button id="next-btn" onclick="nextRound()">SEGÜENT RONDA →</button>
    </div>
  </div>
</div>

<button id="admin-btn" onclick="toggleAdmin()">⚙ Afegir fotos</button>

<div id="admin-panel">
  <div id="admin-card">
    <h2>📸 Afegir foto manual</h2>
    <div class="admin-form">
      <label>URL de la imatge (directa)</label>
      <input type="url" id="input-url" placeholder="https://...jpg">
      <label>Latitud del lloc</label>
      <input type="number" id="input-lat" placeholder="41.6176" step="0.0001">
      <label>Longitud del lloc</label>
      <input type="number" id="input-lng" placeholder="0.6200" step="0.0001">
      <label>Nom del lloc (opcional)</label>
      <input type="text" id="input-name" placeholder="Ex: Plaça de la Paeria">
    </div>
    <div id="photos-list"></div>
    <div class="admin-btns">
      <button class="admin-btns btn-save" style="background:var(--gold);color:#000;border:none;border-radius:6px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;flex:1" onclick="addPhoto()">AFEGIR FOTO</button>
      <button class="admin-btns btn-close" style="background:var(--border);color:var(--text);border:none;border-radius:6px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;flex:1" onclick="toggleAdmin()">TANCAR</button>
    </div>
  </div>
</div>

<script>
const MAPILLARY_TOKEN = 'MLY|26203106146032390|7adb3b5719efc15c2226e5654931a933';
const MAX_POINTS = 5000;
const MAX_DIST_M = 3000;
const STORAGE_KEY = 'lleidaguessr_photos';
const STATS_KEY = 'lleidaguessr_stats';

// Ubicacions base per a Mapillary (places, barris, zones interessants)
const BASE_LOCATIONS = [
  { lat:41.6155, lng:0.6245, name:"La Seu Vella" },
  { lat:41.6176, lng:0.6188, name:"Plaça de la Paeria" },
  { lat:41.6190, lng:0.6170, name:"Rambla Ferran" },
  { lat:41.6210, lng:0.6230, name:"Cappont" },
  { lat:41.6140, lng:0.6185, name:"Barri Antic" },
  { lat:41.6230, lng:0.6148, name:"Universitat" },
  { lat:41.6095, lng:0.6210, name:"Bordeta" },
  { lat:41.6270, lng:0.6200, name:"Pardinyes" },
  { lat:41.6180, lng:0.6120, name:"Magraners" },
  { lat:41.6160, lng:0.6260, name:"Balàfia" },
  { lat:41.6200, lng:0.6175, name:"Indústries" },
  { lat:41.6130, lng:0.6230, name:"Secà de Sant Pere" },
  { lat:41.6250, lng:0.6240, name:"Mariola" },
  { lat:41.6165, lng:0.6200, name:"Centres Històric" },
  { lat:41.6185, lng:0.6155, name:"Noguerola" },
];

let state = {
  round: 0,
  totalScore: 0,
  roundScores: [],
  streak: 0,
  guessMarker: null,
  guessLatLng: null,
  resultMap: null,
  currentItem: null,
  usedIndices: [],
};

// ── Stats ─────────────────────────────────────────────────────────────────────
function loadStats() {
  const s = JSON.parse(localStorage.getItem(STATS_KEY) || '{"best":0,"rounds":0,"totalPts":0}');
  document.getElementById('best-score').textContent = s.best > 0 ? s.best.toLocaleString() : '—';
  document.getElementById('avg-score').textContent = s.rounds > 0 ? Math.round(s.totalPts / s.rounds).toLocaleString() : '—';
  return s;
}

function saveStats(points) {
  const s = JSON.parse(localStorage.getItem(STATS_KEY) || '{"best":0,"rounds":0,"totalPts":0}');
  s.rounds++;
  s.totalPts += points;
  s.best = Math.max(s.best, state.totalScore);
  localStorage.setItem(STATS_KEY, JSON.stringify(s));
  document.getElementById('best-score').textContent = s.best.toLocaleString();
  document.getElementById('avg-score').textContent = Math.round(s.totalPts / s.rounds).toLocaleString();
}

// ── Custom photos ─────────────────────────────────────────────────────────────
function getCustomPhotos() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function saveCustomPhotos(photos) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(photos));
}

function renderPhotosList() {
  const photos = getCustomPhotos();
  const el = document.getElementById('photos-list');
  if (!photos.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;margin-bottom:12px">Cap foto afegida encara</div>'; return; }
  el.innerHTML = photos.map((p, i) => `
    <div class="photo-item">
      <img src="${p.url}" onerror="this.style.display='none'">
      <div><div style="color:var(--text)">${p.name || 'Sense nom'}</div><div style="color:var(--muted)">${p.lat}, ${p.lng}</div></div>
      <span class="del" onclick="deletePhoto(${i})">✕</span>
    </div>`).join('');
}

function addPhoto() {
  const url = document.getElementById('input-url').value.trim();
  const lat = parseFloat(document.getElementById('input-lat').value);
  const lng = parseFloat(document.getElementById('input-lng').value);
  const name = document.getElementById('input-name').value.trim();
  if (!url || isNaN(lat) || isNaN(lng)) { alert('Cal URL, latitud i longitud'); return; }
  const photos = getCustomPhotos();
  photos.push({ url, lat, lng, name: name || 'Lloc de Lleida', type: 'custom' });
  saveCustomPhotos(photos);
  document.getElementById('input-url').value = '';
  document.getElementById('input-lat').value = '';
  document.getElementById('input-lng').value = '';
  document.getElementById('input-name').value = '';
  renderPhotosList();
}

function deletePhoto(i) {
  const photos = getCustomPhotos();
  photos.splice(i, 1);
  saveCustomPhotos(photos);
  renderPhotosList();
}

function toggleAdmin() {
  const p = document.getElementById('admin-panel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) renderPhotosList();
}

// ── Map ───────────────────────────────────────────────────────────────────────
const guessMap = L.map('map', { center:[41.617,0.622], zoom:13 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(guessMap);
guessMap.on('click', function(e) {
  if (state.guessMarker) guessMap.removeLayer(state.guessMarker);
  state.guessLatLng = e.latlng;
  state.guessMarker = L.circleMarker(e.latlng, { radius:10, fillColor:'#f5c542', fillOpacity:1, color:'#fff', weight:2 }).addTo(guessMap);
  document.getElementById('guess-btn').classList.add('ready');
});

// ── Haversine ─────────────────────────────────────────────────────────────────
function haversineM(a, b) {
  const R=6371000, tr=x=>x*Math.PI/180;
  const dLat=tr(b.lat-a.lat), dLon=tr(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(tr(a.lat))*Math.cos(tr(b.lat))*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(s));
}

function calcPoints(distM) {
  if (distM <= 30) return MAX_POINTS;
  if (distM >= MAX_DIST_M) return 0;
  return Math.round(MAX_POINTS * Math.exp(-distM / 700));
}

// ── Mapillary fetch (cerca imatges de façanes/places, no carreteres) ──────────
async function fetchMapillaryImage(lat, lng) {
  // Cerca en radi petit per trobar imatges específiques del lloc
  const delta = 0.0015;
  const bbox = `${lng-delta},${lat-delta},${lng+delta},${lat+delta}`;
  const url = `https://graph.mapillary.com/images?access_token=${MAPILLARY_TOKEN}&fields=id,geometry,thumb_2048_url,captured_at,creator&bbox=${bbox}&limit=50`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.data || !data.data.length) return null;

    // Filtra imatges que tinguin miniatura i barreja
    const valid = data.data.filter(i => i.thumb_2048_url);
    if (!valid.length) return null;

    // Pren una aleatòria (no sempre la primera = evitar sempre la carretera principal)
    const pick = valid[Math.floor(Math.random() * Math.min(valid.length, 15))];
    return {
      url: pick.thumb_2048_url,
      lat: pick.geometry.coordinates[1],
      lng: pick.geometry.coordinates[0],
      type: 'mapillary'
    };
  } catch(e) { return null; }
}

// ── Pick next item ────────────────────────────────────────────────────────────
async function pickNextItem() {
  const custom = getCustomPhotos();

  // Barreja custom i mapillary: 40% custom si n'hi ha
  const useCustom = custom.length > 0 && Math.random() < 0.4;

  if (useCustom) {
    const pick = custom[Math.floor(Math.random() * custom.length)];
    return { ...pick, type: 'custom' };
  }

  // Mapillary: escull ubicació aleatòria no repetida recentment
  let available = BASE_LOCATIONS.filter((_, i) => !state.usedIndices.slice(-5).includes(i));
  if (!available.length) available = BASE_LOCATIONS;
  const idx = BASE_LOCATIONS.indexOf(available[Math.floor(Math.random() * available.length)]);
  state.usedIndices.push(idx);
  const loc = BASE_LOCATIONS[idx];

  const img = await fetchMapillaryImage(loc.lat, loc.lng);
  if (img) return { ...img, name: loc.name };

  // Fallback: torna a intentar amb una altra ubicació
  const fallbackLoc = BASE_LOCATIONS[Math.floor(Math.random() * BASE_LOCATIONS.length)];
  const fallbackImg = await fetchMapillaryImage(fallbackLoc.lat, fallbackLoc.lng);
  if (fallbackImg) return { ...fallbackImg, name: fallbackLoc.name };

  return null;
}

// ── Load round ────────────────────────────────────────────────────────────────
async function loadRound() {
  state.guessLatLng = null;
  if (state.guessMarker) { guessMap.removeLayer(state.guessMarker); state.guessMarker = null; }
  document.getElementById('guess-btn').classList.remove('ready');
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('sv-hint').style.opacity = '1';
  document.getElementById('sv-loading').style.display = 'flex';
  document.getElementById('sv-img').style.display = 'none';
  document.getElementById('sv-iframe').style.display = 'none';
  document.getElementById('round-indicator').textContent = `Ronda ${state.round + 1}`;

  const item = await pickNextItem();

  if (!item) {
    document.getElementById('sv-loading').innerHTML = '<div style="color:var(--red);font-size:14px">No s\'han trobat imatges. Comprova connexió.</div>';
    return;
  }

  state.currentItem = item;

  if (item.type === 'custom') {
    // Imatge estàtica pujada manualment
    const img = document.getElementById('sv-img');
    img.src = item.url;
    img.onload = () => {
      document.getElementById('sv-loading').style.display = 'none';
      img.style.display = 'block';
      document.getElementById('sv-source').textContent = '📸 Foto manual';
      setTimeout(() => document.getElementById('sv-hint').style.opacity = '0', 3000);
    };
    img.onerror = () => {
      document.getElementById('sv-loading').innerHTML = '<div style="color:var(--red);font-size:14px">Error carregant la imatge</div>';
    };
    document.getElementById('sv-hint').textContent = '📍 Identifica el lloc';
  } else {
    // Imatge de Mapillary
    const img = document.getElementById('sv-img');
    img.src = item.url;
    img.onload = () => {
      document.getElementById('sv-loading').style.display = 'none';
      img.style.display = 'block';
      document.getElementById('sv-source').textContent = '🗺 Mapillary · ' + (item.name || '');
      setTimeout(() => document.getElementById('sv-hint').style.opacity = '0', 3000);
    };
    img.onerror = () => loadRound(); // reintenta si falla
    document.getElementById('sv-hint').textContent = '📍 On és aquesta imatge?';
  }
}

// ── Submit guess ──────────────────────────────────────────────────────────────
function submitGuess() {
  if (!state.guessLatLng || !state.currentItem) return;
  const actual = { lat: state.currentItem.lat, lng: state.currentItem.lng };
  const guess = { lat: state.guessLatLng.lat, lng: state.guessLatLng.lng };
  const distM = Math.round(haversineM(actual, guess));
  const points = calcPoints(distM);

  state.totalScore += points;
  state.roundScores.push(points);
  state.streak = points >= 2000 ? state.streak + 1 : 0;

  document.getElementById('total-score').textContent = state.totalScore.toLocaleString();
  if (state.streak >= 2) {
    document.getElementById('streak-badge').style.display = 'block';
    document.getElementById('streak-num').textContent = state.streak;
  } else {
    document.getElementById('streak-badge').style.display = 'none';
  }

  // Actualitza barra de progrés (últimes 10 rondes)
  const recentAvg = state.roundScores.slice(-10).reduce((a,b)=>a+b,0) / Math.min(state.roundScores.length, 10);
  document.getElementById('progress-fill').style.width = `${(recentAvg / MAX_POINTS) * 100}%`;

  saveStats(points);
  showResult(distM, points, actual, guess);
}

// ── Show result ───────────────────────────────────────────────────────────────
function showResult(distM, points, actual, guess) {
  const isClose = distM < 100;
  const distText = distM < 1000 ? `${distM}` : `${(distM/1000).toFixed(1)}`;
  const unit = distM < 1000 ? 'metres de distància' : 'km de distància';

  document.getElementById('result-distance').textContent = distText + (distM >= 1000 ? ' km' : ' m');
  document.getElementById('result-label').textContent = `${unit} · ${state.currentItem.name || ''}`;
  document.getElementById('result-points').textContent = `+${points.toLocaleString()} pts`;

  const col = points > 4000 ? '#3ddc84' : points > 2000 ? '#f5c542' : '#ff4757';
  document.getElementById('result-distance').style.color = col;
  document.getElementById('result-points').style.color = col;

  // Mapa resultat
  document.getElementById('result-map').innerHTML = '';
  if (state.resultMap) { state.resultMap.remove(); state.resultMap = null; }
  setTimeout(() => {
    state.resultMap = L.map('result-map', { zoomControl:false, attributionControl:false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.resultMap);
    const aLL = L.latLng(actual.lat, actual.lng);
    const gLL = L.latLng(guess.lat, guess.lng);
    L.circleMarker(aLL, { radius:10, fillColor:'#3ddc84', fillOpacity:1, color:'#fff', weight:2 })
      .bindTooltip('📍 Lloc real', { permanent:true, direction:'top', offset:[0,-10] }).addTo(state.resultMap);
    L.circleMarker(gLL, { radius:10, fillColor:'#f5c542', fillOpacity:1, color:'#fff', weight:2 })
      .bindTooltip('🎯 La teva', { permanent:true, direction:'top', offset:[0,-10] }).addTo(state.resultMap);
    L.polyline([aLL, gLL], { color:'#ff4757', weight:2, dashArray:'6 4' }).addTo(state.resultMap);
    state.resultMap.fitBounds(L.latLngBounds([aLL, gLL]).pad(0.4));
  }, 100);

  document.getElementById('next-btn').textContent = 'SEGÜENT RONDA →';
  document.getElementById('result-overlay').classList.add('show');
}

// ── Next round ────────────────────────────────────────────────────────────────
function nextRound() {
  state.round++;
  loadRound();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadStats();
loadRound();
</script>
</body>
